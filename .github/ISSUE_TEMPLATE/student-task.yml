name: Student Task
description: Create an implementation or documentation task for an intern.
title: "[Task]: "
labels: ["student-task", "needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this needed and where does it fit in the project?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Use checkboxes for clear completion criteria.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Helpful Resources
      description: Link docs, files, or examples the student should read first.
  - type: textarea
    id: notes
    attributes:
      label: Mentor Notes
      description: Add any guidance, warnings, or constraints.
